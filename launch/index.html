<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#eef1f3" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self'; style-src 'self'; script-src 'self'; base-uri 'none'; form-action 'none'" />
  <title>Open SCP docs</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="launcher.js?v=20260723-2" defer></script>
</head>
<body>
  <main id="launcher" class="launcher" hidden>
    <section class="app-card" aria-labelledby="app-name">
      <div class="app-info">
        <img src="../assets/images/app-icon.png" alt="" width="72" height="72" />
        <div>
          <p class="eyebrow">SCP ARTICLE READER</p>
          <h1 id="app-name">SCP docs</h1>
          <p>Open this article in the app.</p>
        </div>
      </div>

      <a id="open-app" class="open-button">Open App</a>
      <a id="open-store" class="store-link" href="https://apps.apple.com/app/scp-docs/id6765882660">Get SCP docs on the App Store</a>
      <a id="back-to-article" class="web-link">Back to article options</a>
    </section>
    <p id="error" class="error" hidden>The article link is invalid.</p>
  </main>
  <noscript>
    <p class="error">JavaScript is required to open the SCP docs app.</p>
  </noscript>
</body>
</html>
