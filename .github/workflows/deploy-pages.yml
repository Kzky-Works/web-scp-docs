name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download current translation graph
        run: >-
          curl --fail --location --retry 3
          --output "${RUNNER_TEMP}/manifest_daily_scp_translations.json"
          https://raw.githubusercontent.com/Kzky-Works/data-scp-docs/main/list/en/manifest_daily_scp_translations.json

      - name: Verify the static router
        run: |
          python3 -m unittest discover -s tests -p 'test_*.py'
          node --check open/router.js
          node --test tests/router_smoke_test.cjs

      - name: Assemble static site and route shards
        run: |
          mkdir -p "${RUNNER_TEMP}/site"
          tar --exclude=.git --exclude=.github --exclude=tests -cf - . | tar -xf - -C "${RUNNER_TEMP}/site"
          python3 scripts/build_shared_article_routes.py \
            "${RUNNER_TEMP}/manifest_daily_scp_translations.json" \
            "${RUNNER_TEMP}/site/routes"
          if [[ -n "${{ vars.SCPDOCS_CUSTOM_DOMAIN }}" ]]; then
            printf '%s\n' "${{ vars.SCPDOCS_CUSTOM_DOMAIN }}" > "${RUNNER_TEMP}/site/CNAME"
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
