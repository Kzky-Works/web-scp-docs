<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#111418" />
  <meta property="og:title" content="Open an SCP article" />
  <meta property="og:description" content="Open the available SCP Wiki version for your language." />
  <title>Opening SCP article…</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="router.js" defer></script>
</head>
<body>
  <main class="panel" aria-live="polite">
    <p class="eyebrow">SCP docs · ARTICLE ROUTER</p>
    <h1 id="status">Opening the article…</h1>
    <p id="detail">Selecting an available SCP Wiki version for your language.</p>

    <div class="actions">
      <a id="open-app" class="button primary" hidden>Open in SCP docs</a>
      <a id="open-web" class="button" hidden>Continue on the official wiki</a>
    </div>

    <section id="languages" hidden>
      <h2>Available languages</h2>
      <div id="language-links" class="language-links"></div>
    </section>

    <noscript>
      JavaScript is required to select the appropriate official SCP Wiki page.
    </noscript>
  </main>
</body>
</html>
